backend:
  name: git-gateway
  repo: JohnnyB90/a1-air-quality-site
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/0c44972a-604f-44f6-aa44-e8ef9be66229/pkce
  auth_token_endpoint: /sites/0c44972a-604f-44f6-aa44-e8ef9be66229/token
  gateway_url: https://gateway.decapbridge.com
  commit_messages:
    create: Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge

auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

site_url: https://fantastic-cuchufli-cea1d0.netlify.app

media_folder: "images/blog"
public_folder: "/images/blog"

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "blog-content"
    create: true
    slug: "{{slug}}"
    extension: "md"
    fields:
      - { label: "Title", name: "title", widget: "string", hint: "Full blog post title" }
      - { label: "Meta Description", name: "description", widget: "text", hint: "1-2 sentence summary for search engines (under 160 characters)" }
      - { label: "Publish Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Featured Image", name: "image", widget: "image", hint: "Upload a blog header image (JPEG recommended)" }
      - { label: "Image Alt Text", name: "imageAlt", widget: "string", hint: "Describe the image for accessibility" }
      - { label: "Page Subtitle", name: "subtitle", widget: "string", required: false, hint: "Short subtitle shown below the title on the page (optional — defaults to meta description)" }
      - { label: "Breadcrumb Title", name: "breadcrumbTitle", widget: "string", required: false, hint: "Short version of title for the breadcrumb trail (optional — defaults to full title)" }
      - label: "Body"
        name: "body"
        widget: "markdown"
        hint: "Write your blog post content here. Use headings (##), bold, links, and lists."
      - label: "Sources"
        name: "sources"
        widget: "list"
        required: false
        hint: "Optional references shown at the bottom of the post"
        fields:
          - { label: "Source Title", name: "title", widget: "string" }
          - { label: "URL", name: "url", widget: "string" }
      - label: "FAQs"
        name: "faqs"
        widget: "list"
        required: false
        hint: "Optional FAQ section — great for SEO. Each Q&A gets structured data."
        fields:
          - { label: "Question", name: "question", widget: "string" }
          - { label: "Answer", name: "answer", widget: "text" }
